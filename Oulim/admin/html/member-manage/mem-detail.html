<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사용자 상세</title>
  <!-- base css 필수 삽입-->
  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/Typography.css" />
  <!-- 컨포넌트 css 선택-->
  <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />

  <link rel="stylesheet" href="/Oulim/admin/css/member-manage/mem-detail.css" />
</head>

<body>
  <!-- Header 자동 삽입 -->
  <!-- <%@ include file="header.jsp" %> -->

  <main class="l-main">
    <!-- 사이드바 -->
    <aside>
      <!-- 관리자 영역 -->
      <div class="adminnow">
        <img src="" width="40" height="40" />

        <button class="c-button c-button--primary c-button--md">
          로그아웃
        </button>
      </div>

      <!-- 사이드바 메뉴 -->
      <nav class="sidebar-menu">
        <ul>
          <li class="menu-item">
            <a href="/Oulim/admin/html/dashboard/dashboard.html">통계</a>
          </li>

          <!-- 회원관리 -->
          <li class="menu-item dropdown">
            <a href="#" class="menu-title"> 회원관리 </a>

            <ul class="submenu">
              <li><a href="/Oulim/admin/html/member-manage/company-certification.html">기업회원</a></li>
              <li><a href="/Oulim/admin/html/member-manage/mem-list.html">회원조회</a></li>
            </ul>
          </li>

          <!-- 봉사활동관리 -->
         <li class="menu-item dropdown">
            <a href="/Oulim/admin/html/volunteer-manage/volun-list.html" class="menu-title"> 봉사활동관리 </a>
          </li>

          <!-- 게시판관리 -->
          <li class="menu-item dropdown">
            <a href="/Oulim/admin/html/community-manage/post-list.html" class="menu-title"> 게시판관리 </a>
          </li>
        </ul>
      </nav>
    </aside>

      <!-- 메인 헤더 -->
      <section class="l-content">
        <div class="header">
          <h1>회원상세</h1>
        </div>
        <form>

          <div class="main-pw">

            <div class="i-nickname">

              <h5>닉네임</h5>
              <div class="pw-text">
                <input id="nickname" type="text" class="c-input" name="nickname" placeholder="닉네임">
                <button type="button" class="c-button c-button--primary c-button--md">중복확인</button>
              </div>
            </div>

            <p>
            <div class="c-form-field is-error">

              <label class="c-form-field__label">
                <h5>닉네임</h5>
              </label>
              <div class="pw-text">
                <input type="text" class="c-input" placeholder="닉네임">
                <button type="button" class="c-button c-button--primary c-button--md">중복확인</button>
              </div>
              <span class="c-form-field__error">
                존재하는 닉네임입니다.
              </span>

            </div>
            </p>

            <div class="i-email">

              <h5>이메일</h5>
              <div class="pw-text">
                <input id="email" type="text" class="c-input" name="email" placeholder="이메일">
                <button type="button" class="c-button c-button--primary c-button--md">중복확인</button>
              </div>
            </div>

            <p>
            <div class="c-form-field is-error">

              <label class="c-form-field__label">
                <h5>이메일</h5>
              </label>
              <div class="pw-text">
                <input type="text" class="c-input" placeholder="이메일">
                <button type="button" class="c-button c-button--primary c-button--md">중복확인</button>
              </div>
              <span class="c-form-field__error">
                존재하는 이메일입니다.
              </span>

            </div>
            </p>

            <h5>인증번호</h5>
            <div class="pw-text">
              <input id="verify" type="text" class="c-input" name="verify" placeholder="이메일 인증번호 입력">
              <button class="c-button c-button--primary c-button--md">인증확인</button>
            </div>

            <p>
            <div class="c-form-field is-error">

              <label class="c-form-field__label">
                <h5>인증번호</h5>
              </label>
              <div class="pw-text">
                <input type="email" class="c-input" placeholder="이메일 인증번호 입력">
                <button type="button" class="c-button c-button--primary c-button--md">중복확인</button>
              </div>
              <span class="c-form-field__error">
                인증번호가 일치하지 않습니다.
              </span>

            </div>
            </p>

            <h5>비밀번호 수정</h5>
            <div class="pw-text">
              
              <input type="password" class="c-input" name="new-password" placeholder="새 비밀번호 입력">
              <button type="button" id="c-password-btn-toggle"><img src="/Oulim/asset/image/user/password-off.png" alt="eye" id="c-password-toggle-img" /></button>
            </div>

            <h5>비밀번호 재확인</h5>
            <div class="pw-text">
              <input type="password" class="c-input" name="new-password-check" placeholder="비밀번호 확인">
              <button type="button" id="c-password-btn-toggle-2"><img src="/Oulim/asset/image/user/password-off.png" alt="eye" id="c-password-toggle-2-img" /></button>
            </div>

            <h5>주소</h5>
            <div class="pw-text">
              <input type="text" class="c-input" name="address" placeholder="주소 추가하기">
              <button class="c-button c-button--primary c-button--md">주소검색</button>
            </div>

          </div>

          <div class="c-button-group">
            <button id="accept" class="c-button c-button--primary c-button--md">수정</button>
            <button id="cancel" class="c-button c-button--secondary c-button--md">취소</button>
          </div>

        </form>
      </section>
  </main>



  <!-- Footer 자동 삽입 -->
  <!-- <%@ include file="footer.jsp" %> -->
</body>

</html>
