<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>봉사 후기 등록</title>

  <!-- base css 필수 삽입-->
  <link rel="stylesheet" href="/Oulim/asset/css/core/reset.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/variable.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/core/typography.css" />
  <!-- 컨포넌트 css 선택-->
  <link rel="stylesheet" href="/Oulim/asset/css/component/pagination.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/input.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/button.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/list.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/card.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/DetailCard.css" />
  <link rel="stylesheet" href="/Oulim/asset/css/component/badge.css" />

  <script src="/Oulim/asset/assets/js/include.js"></script>
</head>

<body>
  <!-- Header 자동 삽입 -->
  <%@ include file="header.jsp" %>

    <main class="l-main">
      <!-- 팀원들 작성 영역 이 안에서 작업하기!!퍼블 작업진행 -->
      <!-- TODO : css 로 스타일 적용, repost는 똑같이 처리하기 -->
      <div class="p-community-post">
        <h1>봉사 후기 등록</h1>
        <form action="">
          <div class="l-title">
            <label for=""><b>제목</b></label>
            <!-- 컴포넌트 c-input 사용 -->
            <input class="c-input" type="text" name="" id="" placeholder="후기 제목 입력" />
          </div>

          <div class="l-community-post-detail">
            <h5>상세 내용 작성</h5>
            <!-- 컬포넌트 c-input 사용 -->
            <input class="c-input" type="text" name="" id="" placeholder="본문을 입력하세요.">
          </div>

          <div class="l-community-post-img-attach">
            <!-- TODO : 이미지 추가 관련 처리하기 -->
            <h5>이미지 등록</h5>
            <input type="text" readonly>
            <input type="file" id="imageInput" accept="image/*">
          </div>
          <div class="l-community-post-btn-group">
            <!-- 공용 컴포넌트 투버튼 c-button-group  -->
            <div class="c-button-group">
              <button class="c-button c-button--primary c-button--md">등록</button>
              <button class="c-button c-button--secondary c-button--md">취소</button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <!-- Footer 자동 삽입 -->
    <%@ include file="footer.jsp" %>
</body>

</html>
